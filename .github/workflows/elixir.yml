name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: mix test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { elixir: "1.18.4", otp: "28.3" }

    defaults:
      run:
        working-directory: soot_device_protocol

    steps:
      # `:duxedo` is consumed via `{:duxedo, path: "../duxedo", optional: true}`
      # so deps.get / deps.unlock --check-unused need the sibling repo on
      # disk. Lay both out under their canonical names.
      - uses: actions/checkout@v4
        with:
          path: soot_device_protocol

      - uses: actions/checkout@v4
        with:
          repository: soot-iot/duxedo
          path: duxedo

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            soot_device_protocol/deps
            soot_device_protocol/_build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('soot_device_protocol/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: soot_device_protocol/priv/plts
          key: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('soot_device_protocol/mix.lock') }}
          restore-keys: |
            plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get
      - run: mix deps.unlock --check-unused
      - run: mix deps.audit
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix sobelow
      - run: mix test
      - run: mix dialyzer --format github
